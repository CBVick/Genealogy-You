<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In | Genealogy You</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    .form-wrap{
      background: linear-gradient(180deg, #ffffff, #f9fafb);
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">Genealogy You</a>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="getting-started.html">Getting Started</a>
        <a href="research.html">Research</a>
        <a href="tips.html">Tips</a>
        <a href="signin.html" aria-current="page">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container">

      <h1 style="margin-bottom: 10px;">Sign In</h1>

      <p style="color:#6b7280; margin-bottom: 18px;">
        Enter your information below. After validation, the official Microsoft Form will open so your information can be submitted and stored.
      </p>

      <section class="form-wrap">
        <form id="signin-form">
          <div class="form-grid">

            <div>
              <label for="first-name">First Name:</label>
              <input type="text" id="first-name" required>
            </div>

            <div>
              <label for="last-name">Last Name:</label>
              <input type="text" id="last-name" required>
            </div>

            <div>
              <label for="email">Email Address:</label>
              <input type="email" id="email" required>
            </div>

            <div class="actions">
              <button class="btn" type="submit">Continue to Microsoft Form</button>
              <span class="help">Validation happens here. Submission is completed in Microsoft Forms.</span>
            </div>

          </div>
        </form>
      </section>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© Genealogy You</p>
    </div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("signin-form");
      const firstName = document.getElementById("first-name");
      const lastName = document.getElementById("last-name");
      const email = document.getElementById("email");

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        let errors = [];

        if (firstName.value.trim().length < 2) {
          errors.push("First name must be at least 2 characters.");
        }

        if (lastName.value.trim().length < 2) {
          errors.push("Last name must be at least 2 characters.");
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email.value.trim())) {
          errors.push("Enter a valid email address.");
        }

        if (errors.length > 0) {
          alert(errors.join("\\n"));
        } else {
          alert("Validation successful. The Microsoft Form will open next.");
          window.open("https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=GUsqSzXRDkKLsrHNI4mYzOfxR0Oo-EdEir4jNwBZzm9UQVpQTjFPTlBKVDlFN1JFR1BJNFMxTkZUNC4u", "_blank");
        }
      });
    });
  </script>

</body>
</html>
